<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesial Untuk Zahra</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            overflow: hidden;
            perspective: 1000px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            transform-style: preserve-3d;
            width: 280px;
        }

        h1 {
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-shadow: 0 0 10px #ff0055;
            margin-bottom: 10px;
        }

        p {
            color: #ddd;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .heart {
            font-size: 50px;
            color: #ff0055;
            margin-top: 20px;
            animation: pulse 1.5s infinite;
            display: inline-block;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="card" id="card">
        <h1>Halo, Zahra!</h1>
        <p>Terima kasih ya sudah jadi teman yang luar biasa.</p>
        <div class="heart">❤️</div>
    </div>

    <script>
        const card = document.getElementById('card');
        const body = document.querySelector('body');

        body.addEventListener('mousemove', (e) => {
            let x = (window.innerWidth / 2 - e.pageX) / 15;
            let y = (window.innerHeight / 2 - e.pageY) / 15;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });

        body.addEventListener('touchmove', (e) => {
            let touch = e.touches[0];
            let x = (window.innerWidth / 2 - touch.pageX) / 10;
            let y = (window.innerHeight / 2 - touch.pageY) / 10;
            card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
        });
    </script>
</body>
</html>
