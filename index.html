<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terima Kasih, Zahra!</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
        }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #ff6b6b; margin-bottom: 1rem; }
        p { line-height: 1.6; font-size: 1.1rem; }
        .heart { color: #ff6b6b; font-size: 2rem; margin-top: 1rem; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Halo, Zahra!</h1>
        <p>Terima kasih banyak ya sudah menjadi teman yang luar biasa.</p>
        <span class="heart">❤️</span>
    </div>
</body>
</html>
